<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新人GD项目述职看板</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f6f8; min-height: 100vh; }

  /* ─── 顶部工具栏 ─── */
  .toolbar {
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .toolbar-title { font-size: 15px; font-weight: 600; color: #111827; }
  .toolbar-actions { display: flex; gap: 8px; }
  .btn {
    padding: 5px 12px; border-radius: 6px; border: 1px solid #d1d5db;
    background: #fff; font-size: 13px; cursor: pointer; color: #374151;
    transition: all .15s;
  }
  .btn:hover { background: #f3f4f6; }
  .btn-primary { background: #f97316; color: #fff; border-color: #f97316; }
  .btn-primary:hover { background: #ea6c0a; }
  .btn-danger { background: #fff; color: #dc2626; border-color: #dc2626; }
  .btn-danger:hover { background: #fef2f2; }
  .btn-green { background: #16a34a; color: #fff; border-color: #16a34a; }
  .btn-green:hover { background: #15803d; }

  /* ─── Tab 栏 ─── */
  .tabs-bar {
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 4px;
    overflow-x: auto;
  }
  .tab {
    padding: 10px 16px; font-size: 14px; cursor: pointer;
    border-bottom: 2px solid transparent; color: #6b7280; white-space: nowrap;
    user-select: none; transition: all .15s; position: relative;
    display: flex; align-items: center; gap: 6px;
  }
  .tab.active { color: #f97316; border-bottom-color: #f97316; font-weight: 600; }
  .tab:hover { color: #374151; }
  .tab .del-tab {
    font-size: 11px; color: #9ca3af; cursor: pointer;
    width: 16px; height: 16px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: transparent; border: none; padding: 0;
  }
  .tab .del-tab:hover { background: #fee2e2; color: #dc2626; }
  .tab-add {
    padding: 10px 12px; font-size: 20px; cursor: pointer; color: #9ca3af; line-height: 1;
  }
  .tab-add:hover { color: #f97316; }

  /* ─── 看板内容区 ─── */
  .board { display: none; padding: 20px; }
  .board.active { display: block; }

  /* ─── 看板头部 ─── */
  .board-header { background: #fff; border-radius: 10px; padding: 18px 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .board-title {
    font-size: 20px; font-weight: 700; color: #111827; margin-bottom: 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .board-title-icon { font-size: 18px; }
  .board-judges { font-size: 14px; color: #6b7280; }
  .board-judges span[contenteditable] { display: inline; }

  [contenteditable] { outline: none; }
  [contenteditable]:focus {
    background: #fffbeb; border-radius: 4px;
    box-shadow: 0 0 0 2px #fcd34d;
  }
  [contenteditable]:hover { background: #f9fafb; border-radius: 3px; }

  /* ─── 表格区域 ─── */
  .table-wrap { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.06); overflow: hidden; }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 900px; }
  thead tr { background: #f9fafb; }
  th {
    padding: 10px 10px; font-size: 12px; font-weight: 600; color: #374151;
    border-bottom: 1px solid #e5e7eb; text-align: left; white-space: nowrap;
    position: relative;
  }
  th.col-total { color: #dc2626; }
  td {
    padding: 8px 10px; font-size: 13px; color: #374151;
    border-bottom: 1px solid #f3f4f6; vertical-align: top;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafaf9; }
  tr.adding td { background: #fefce8; }

  .cell-name { font-weight: 700; font-size: 14px; }
  .cell-sub { font-size: 12px; color: #9ca3af; margin-top: 2px; }
  .cell-doc a { color: #7c3aed; font-size: 12px; text-decoration: none; }
  .cell-doc a:hover { text-decoration: underline; }

  /* 评分颜色 */
  .score { font-weight: 700; font-size: 14px; }
  .score-3_5 { color: #f97316; }
  .score-3_5plus { color: #16a34a; }
  .score-3_75 { color: #16a34a; }
  .score-4_0 { color: #2563eb; }
  .score-total { font-size: 16px; }

  .score-comment { font-size: 12px; color: #6b7280; margin-top: 2px; line-height: 1.4; }
  .score-cell { min-width: 100px; }

  /* 行操作 */
  .row-actions { opacity: 0; transition: opacity .15s; display: flex; gap: 4px; }
  tr:hover .row-actions { opacity: 1; }
  .btn-icon {
    background: none; border: none; cursor: pointer; padding: 2px 5px;
    font-size: 12px; border-radius: 4px; color: #9ca3af;
  }
  .btn-icon:hover { background: #fee2e2; color: #dc2626; }

  /* ─── 延期述职 ─── */
  .delay-section {
    background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px;
    padding: 12px 16px; margin-top: 16px; font-size: 13px; color: #92400e;
  }
  .delay-section .delay-label { font-weight: 600; margin-bottom: 4px; }

  /* ─── 评委管理 ─── */
  .judge-mgr { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
  .judge-tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: #f3f4f6; border-radius: 20px; padding: 2px 10px 2px 12px;
    font-size: 13px; color: #374151;
  }
  .judge-tag .del-judge { background: none; border: none; cursor: pointer; color: #9ca3af; font-size: 14px; line-height: 1; }
  .judge-tag .del-judge:hover { color: #dc2626; }
  .judge-input {
    border: 1px dashed #d1d5db; border-radius: 20px; padding: 2px 10px;
    font-size: 13px; width: 80px; outline: none; color: #374151;
  }
  .judge-input:focus { border-color: #f97316; }

  /* 看板底部按钮 */
  .board-footer { padding: 12px 16px; display: flex; gap: 10px; align-items: center; border-top: 1px solid #f3f4f6; }

  /* 模态框 */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
    z-index: 200; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 12px; padding: 24px; width: 420px; max-width: 95vw;
    box-shadow: 0 20px 60px rgba(0,0,0,.2);
  }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .modal textarea {
    width: 100%; height: 180px; border: 1px solid #e5e7eb; border-radius: 8px;
    padding: 10px; font-size: 13px; font-family: monospace; resize: vertical; outline: none;
  }
  .modal textarea:focus { border-color: #f97316; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
  .modal input[type=text] {
    width: 100%; border: 1px solid #e5e7eb; border-radius: 8px; padding: 8px 12px;
    font-size: 14px; outline: none; margin-bottom: 10px;
  }
  .modal input[type=text]:focus { border-color: #f97316; }

  /* 提示 */
  .toast {
    position: fixed; bottom: 24px; right: 24px; background: #111827; color: #fff;
    padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 300;
    transform: translateY(80px); opacity: 0; transition: all .3s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 600px) {
    .toolbar { flex-direction: column; gap: 8px; align-items: flex-start; }
  }
</style>
</head>
<body>

<!-- 工具栏 -->
<div class="toolbar">
  <div class="toolbar-title">📋 新人GD项目述职看板</div>
  <div class="toolbar-actions">
    <button class="btn" onclick="importData()">📥 导入</button>
    <button class="btn" onclick="exportData()">📤 导出</button>
    <button class="btn btn-danger" onclick="resetData()">🗑 清空数据</button>
  </div>
</div>

<!-- Tab 栏 -->
<div class="tabs-bar" id="tabsBar">
  <!-- 动态生成 -->
  <span class="tab-add" onclick="addPeriod()" title="新增一期">＋</span>
</div>

<!-- 看板内容 -->
<div id="boards"></div>

<!-- 延期述职悬浮底部（跟随看板） -->

<!-- 模态框：导入JSON -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <h3>📥 导入数据（JSON）</h3>
    <textarea id="importText" placeholder="粘贴 JSON 数据..."></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('importModal')">取消</button>
      <button class="btn btn-primary" onclick="doImport()">导入</button>
    </div>
  </div>
</div>

<!-- 模态框：编辑文档链接 -->
<div class="modal-overlay" id="docModal">
  <div class="modal">
    <h3>📎 编辑文档链接</h3>
    <input type="text" id="docUrlInput" placeholder="https://docs.xiaohongshu.com/...">
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('docModal')">取消</button>
      <button class="btn btn-primary" onclick="saveDocUrl()">保存</button>
    </div>
  </div>
</div>

<!-- 模态框：新增期 -->
<div class="modal-overlay" id="addPeriodModal">
  <div class="modal">
    <h3>➕ 新增述职期</h3>
    <input type="text" id="periodNameInput" placeholder="例：第二期述职 · 2026年6月15日">
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('addPeriodModal')">取消</button>
      <button class="btn btn-primary" onclick="confirmAddPeriod()">添加</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

// ══════════════════════════════════════════
//  存储
// ══════════════════════════════════════════
let data = {};
let currentDocTarget = null; // { periodId, rowId }

function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    data = saved ? JSON.parse(saved) : defaultData();
  } catch(e) { data = defaultData(); }
}
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ══════════════════════════════════════════
//  评分颜色
// ══════════════════════════════════════════
function scoreClass(s) {
  if (!s) return '';
  const v = s.trim();
  if (v === '4.0' || v === '4' || parseFloat(v) >= 4) return 'score-4_0';
  if (v === '3.75') return 'score-3_75';
  if (v === '3.5+' || v === '3.5＋') return 'score-3_5plus';
  if (v === '3.5') return 'score-3_5';
  if (parseFloat(v) > 3.75) return 'score-4_0';
  if (parseFloat(v) > 3.5) return 'score-3_75';
  return 'score-3_5';
}

// ══════════════════════════════════════════
//  渲染
// ══════════════════════════════════════════
function render() {
  renderTabs();
  renderBoards();
}

function renderTabs() {
  const bar = document.getElementById('tabsBar');
  const addBtn = bar.querySelector('.tab-add');
  // 清除旧 tab
  bar.querySelectorAll('.tab').forEach(t => t.remove());

  data.periods.forEach(p => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (p.id === data.activePeriodId ? ' active' : '');
    tab.dataset.pid = p.id;
    tab.innerHTML = `<span onclick="switchPeriod('${p.id}')">${p.title} · ${p.date}</span>
      <button class="del-tab" onclick="deletePeriod('${p.id}')" title="删除此期">✕</button>`;
    bar.insertBefore(tab, addBtn);
  });
}

function renderBoards() {
  const container = document.getElementById('boards');
  container.innerHTML = '';
  data.periods.forEach(p => {
    container.appendChild(buildBoard(p));
  });
}

function buildBoard(p) {
  const div = document.createElement('div');
  div.className = 'board' + (p.id === data.activePeriodId ? ' active' : '');
  div.id = 'board-' + p.id;

  div.innerHTML = `
  <div class="board-header">
    <div class="board-title">
      <span class="board-title-icon">📋</span>
      <span contenteditable="true" data-field="title" data-pid="${p.id}"
        onblur="saveField(this,'title','${p.id}')">${p.title}</span>
      <span style="font-weight:400;color:#9ca3af">·</span>
      <span contenteditable="true" data-field="date" data-pid="${p.id}"
        onblur="saveField(this,'date','${p.id}')">${p.date}</span>
    </div>
    <div class="board-judges">
      <b>评委：</b>
      <div class="judge-mgr" id="judges-${p.id}">
        ${p.judges.map((j,i) => `
          <span class="judge-tag">
            <span contenteditable="true"
              onblur="saveJudge(this,'${p.id}',${i})">${j}</span>
            <button class="del-judge" onclick="removeJudge('${p.id}',${i})">×</button>
          </span>
        `).join('')}
        <input class="judge-input" placeholder="+ 添加评委" id="newJudge-${p.id}"
          onkeydown="if(event.key==='Enter')addJudge('${p.id}')">
      </div>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-scroll">
      <table id="table-${p.id}">
        <thead>
          <tr>
            <th style="min-width:100px">薯名</th>
            <th style="min-width:100px">小组</th>
            <th style="min-width:50px">L1</th>
            <th style="min-width:90px">入职日期</th>
            <th style="min-width:80px">述职文档</th>
            ${p.judges.map(j=>`<th class="score-cell">${j}</th>`).join('')}
            <th class="col-total" style="min-width:60px">综合</th>
            <th style="min-width:40px"></th>
          </tr>
        </thead>
        <tbody id="tbody-${p.id}">
          ${p.rows.map(r => buildRow(p, r)).join('')}
        </tbody>
      </table>
    </div>
    <div class="board-footer">
      <button class="btn btn-green" onclick="addRow('${p.id}')">➕ 添加新人</button>
    </div>
  </div>

  <div class="delay-section">
    <div class="delay-label">⚠️ 延期述职</div>
    <div contenteditable="true" data-field="delays" data-pid="${p.id}"
      onblur="saveField(this,'delays','${p.id}')"
      style="margin-top:4px;min-height:20px">${p.delays || '（暂无延期述职）'}</div>
  </div>
  `;
  return div;
}

function buildRow(p, r) {
  const scoreCols = p.judges.map(j => {
    const s = r.scores[j] || { score: '', comment: '' };
    return `<td class="score-cell">
      <div class="score ${scoreClass(s.score)}" contenteditable="true"
        onblur="saveScore(this,'${p.id}','${r.id}','${j}','score')"
        oninput="applyScoreColor(this)">${s.score}</div>
      <div class="score-comment" contenteditable="true"
        onblur="saveScore(this,'${p.id}','${r.id}','${j}','comment')">${s.comment}</div>
    </td>`;
  }).join('');

  return `<tr id="row-${p.id}-${r.id}">
    <td>
      <div class="cell-name" contenteditable="true"
        onblur="saveRowField(this,'${p.id}','${r.id}','name')">${r.name}</div>
    </td>
    <td>
      <div contenteditable="true" onblur="saveRowField(this,'${p.id}','${r.id}','group')">${r.group}</div>
      <div class="cell-sub" contenteditable="true" onblur="saveRowField(this,'${p.id}','${r.id}','city')">${r.city}</div>
    </td>
    <td>
      <div contenteditable="true" onblur="saveRowField(this,'${p.id}','${r.id}','l1')">${r.l1}</div>
    </td>
    <td>
      <div contenteditable="true" onblur="saveRowField(this,'${p.id}','${r.id}','joinDate')">${r.joinDate}</div>
    </td>
    <td class="cell-doc">
      <a href="${r.docUrl}" target="_blank" id="doclink-${p.id}-${r.id}">📎 查看文档</a>
      <div style="margin-top:3px">
        <button class="btn" style="font-size:11px;padding:2px 6px"
          onclick="editDocUrl('${p.id}','${r.id}')">✏️ 改链接</button>
      </div>
    </td>
    ${scoreCols}
    <td>
      <div class="score score-total ${scoreClass(r.total)}" contenteditable="true"
        onblur="saveRowField(this,'${p.id}','${r.id}','total')"
        oninput="applyScoreColor(this)">${r.total}</div>
    </td>
    <td>
      <div class="row-actions">
        <button class="btn-icon" onclick="deleteRow('${p.id}','${r.id}')" title="删除此行">🗑</button>
      </div>
    </td>
  </tr>`;
}

// ══════════════════════════════════════════
//  交互处理
// ══════════════════════════════════════════

function switchPeriod(pid) {
  data.activePeriodId = pid;
  saveData();
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.pid === pid));
  document.querySelectorAll('.board').forEach(b => b.classList.toggle('active', b.id === 'board-'+pid));
}

function addPeriod() {
  document.getElementById('periodNameInput').value = '';
  openModal('addPeriodModal');
  setTimeout(() => document.getElementById('periodNameInput').focus(), 100);
}

function confirmAddPeriod() {
  const val = document.getElementById('periodNameInput').value.trim();
  let title = '新述职期', date = '';
  if (val) {
    const m = val.match(/^(.*?)·(.*)$/);
    if (m) { title = m[1].trim(); date = m[2].trim(); }
    else { title = val; date = ''; }
  }
  const id = 'p' + Date.now();
  data.periods.push({
    id, title, date,
    judges: ['评委A','评委B'],
    rows: [],
    delays: ''
  });
  data.activePeriodId = id;
  closeModal('addPeriodModal');
  saveData();
  render();
}

function deletePeriod(pid) {
  if (data.periods.length <= 1) { toast('至少保留一期！'); return; }
  if (!confirm('确定删除此期？')) return;
  data.periods = data.periods.filter(p => p.id !== pid);
  if (data.activePeriodId === pid) data.activePeriodId = data.periods[0].id;
  saveData(); render();
}

function saveField(el, field, pid) {
  const p = data.periods.find(p => p.id === pid);
  if (p) { p[field] = el.innerText.trim(); saveData(); }
  // 同步 tab 标题
  if (field === 'title' || field === 'date') renderTabs();
}

function saveJudge(el, pid, idx) {
  const p = data.periods.find(p => p.id === pid);
  if (p) { p.judges[idx] = el.innerText.trim(); saveData(); }
}

function removeJudge(pid, idx) {
  const p = data.periods.find(p => p.id === pid);
  if (!p) return;
  const judge = p.judges[idx];
  if (!confirm(`删除评委「${judge}」？此评委的所有评分将一并删除。`)) return;
  p.judges.splice(idx, 1);
  p.rows.forEach(r => { delete r.scores[judge]; });
  saveData(); render(); switchPeriod(pid);
}

function addJudge(pid) {
  const input = document.getElementById('newJudge-' + pid);
  const name = input.value.trim();
  if (!name) return;
  const p = data.periods.find(p => p.id === pid);
  if (!p) return;
  if (p.judges.includes(name)) { toast('评委已存在'); return; }
  p.judges.push(name);
  p.rows.forEach(r => { if (!r.scores[name]) r.scores[name] = { score: '', comment: '' }; });
  saveData(); render(); switchPeriod(pid);
}

function saveScore(el, pid, rid, judge, field) {
  const p = data.periods.find(p => p.id === pid);
  if (!p) return;
  const r = p.rows.find(r => r.id === rid);
  if (!r) return;
  if (!r.scores[judge]) r.scores[judge] = { score: '', comment: '' };
  r.scores[judge][field] = el.innerText.trim();
  saveData();
}

function saveRowField(el, pid, rid, field) {
  const p = data.periods.find(p => p.id === pid);
  if (!p) return;
  const r = p.rows.find(r => r.id === rid);
  if (!r) return;
  r[field] = el.innerText.trim();
  saveData();
  // 综合列颜色
  if (field === 'total') applyScoreColor(el);
}

function applyScoreColor(el) {
  const v = el.innerText.trim();
  el.className = el.className.replace(/score-\S+/g, '').trim();
  const cls = scoreClass(v);
  if (cls) el.classList.add(cls);
}

function addRow(pid) {
  const p = data.periods.find(p => p.id === pid);
  if (!p) return;
  const id = 'r' + Date.now();
  const scores = {};
  p.judges.forEach(j => { scores[j] = { score: '', comment: '' }; });
  const row = { id, name: '新人(真名)', group: '小组', city: '城市', l1: '', joinDate: '', docUrl: '#', scores, total: '' };
  p.rows.push(row);
  saveData();
  const tbody = document.getElementById('tbody-' + pid);
  const tr = document.createElement('tr');
  tr.id = `row-${pid}-${id}`;
  tr.innerHTML = buildRow(p, row).replace(/^<tr[^>]*>/, '').replace(/<\/tr>$/, '');
  tbody.appendChild(tr);
  toast('新人已添加，请直接编辑各格内容');
}

function deleteRow(pid, rid) {
  const p = data.periods.find(p => p.id === pid);
  if (!p) return;
  const row = p.rows.find(r => r.id === rid);
  if (!confirm(`删除「${row?.name || '此行'}」？`)) return;
  p.rows = p.rows.filter(r => r.id !== rid);
  saveData();
  const tr = document.getElementById(`row-${pid}-${rid}`);
  if (tr) tr.remove();
}

// 文档链接
function editDocUrl(pid, rid) {
  const p = data.periods.find(p => p.id === pid);
  const r = p?.rows.find(r => r.id === rid);
  if (!r) return;
  currentDocTarget = { pid, rid };
  document.getElementById('docUrlInput').value = r.docUrl === '#' ? '' : r.docUrl;
  openModal('docModal');
  setTimeout(() => document.getElementById('docUrlInput').focus(), 100);
}

function saveDocUrl() {
  if (!currentDocTarget) return;
  const { pid, rid } = currentDocTarget;
  const url = document.getElementById('docUrlInput').value.trim() || '#';
  const p = data.periods.find(p => p.id === pid);
  const r = p?.rows.find(r => r.id === rid);
  if (r) {
    r.docUrl = url;
    saveData();
    const link = document.getElementById(`doclink-${pid}-${rid}`);
    if (link) link.href = url;
    toast('文档链接已保存');
  }
  closeModal('docModal');
}

// ══════════════════════════════════════════
//  导入/导出
// ══════════════════════════════════════════
function exportData() {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `gd_review_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('已导出 JSON 文件');
}

function importData() {
  document.getElementById('importText').value = '';
  openModal('importModal');
}

function doImport() {
  try {
    const json = document.getElementById('importText').value.trim();
    const imported = JSON.parse(json);
    if (!imported.periods) throw new Error('格式不正确');
    data = imported;
    saveData(); render();
    closeModal('importModal');
    toast('✅ 导入成功');
  } catch(e) {
    alert('JSON 格式错误：' + e.message);
  }
}

function resetData() {
  if (!confirm('确定清空所有数据，恢复为初始示例？')) return;
  data = defaultData();
  saveData(); render();
  toast('已重置为初始数据');
}

// ══════════════════════════════════════════
//  模态框
// ══════════════════════════════════════════
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-overlay')) closeModal(e.target.id);
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
});

// ══════════════════════════════════════════
//  Toast
// ══════════════════════════════════════════
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ══════════════════════════════════════════
//  启动
// ══════════════════════════════════════════
loadData();
render();
</script>
</body>
</html>
