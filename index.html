<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新人GD项目述职看板</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f6f8; min-height: 100vh; }

.toolbar {
  background: #fff; border-bottom: 1px solid #e5e7eb;
  padding: 10px 20px; display: flex; align-items: center;
  justify-content: space-between; position: sticky; top: 0; z-index: 100;
}
.toolbar-title { font-size: 15px; font-weight: 600; color: #111827; }
.toolbar-actions { display: flex; gap: 8px; }

.btn {
  padding: 5px 12px; border-radius: 6px; border: 1px solid #d1d5db;
  background: #fff; font-size: 13px; cursor: pointer; color: #374151; transition: all .15s;
}
.btn:hover { background: #f3f4f6; }
.btn-primary { background: #f97316; color: #fff; border-color: #f97316; }
.btn-primary:hover { background: #ea6c0a; }
.btn-danger { color: #dc2626; border-color: #fca5a5; }
.btn-danger:hover { background: #fef2f2; }
.btn-green { background: #16a34a; color: #fff; border-color: #16a34a; }
.btn-green:hover { background: #15803d; }

.tabs-bar {
  background: #fff; border-bottom: 1px solid #e5e7eb;
  display: flex; align-items: center; padding: 0 20px; gap: 4px; overflow-x: auto;
}
.tab {
  padding: 10px 16px; font-size: 14px; cursor: pointer;
  border-bottom: 2px solid transparent; color: #6b7280; white-space: nowrap;
  user-select: none; transition: all .15s; display: flex; align-items: center; gap: 6px;
}
.tab.active { color: #f97316; border-bottom-color: #f97316; font-weight: 600; }
.tab:hover:not(.active) { color: #374151; }
.tab .del-tab {
  font-size: 11px; color: #9ca3af; cursor: pointer; width: 16px; height: 16px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  background: transparent; border: none; padding: 0; line-height: 1;
}
.tab .del-tab:hover { background: #fee2e2; color: #dc2626; }
.tab-add { padding: 10px 12px; font-size: 20px; cursor: pointer; color: #9ca3af; }
.tab-add:hover { color: #f97316; }

.board { display: none; padding: 20px; }
.board.active { display: block; }

.board-header {
  background: #fff; border-radius: 10px; padding: 18px 20px;
  margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.board-title {
  font-size: 20px; font-weight: 700; color: #111827; margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}
.board-judges { font-size: 14px; color: #6b7280; }
.judge-mgr { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
.judge-tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: #f3f4f6; border-radius: 20px; padding: 2px 8px 2px 12px; font-size: 13px;
}
.del-judge {
  background: none; border: none; cursor: pointer; color: #9ca3af;
  font-size: 15px; line-height: 1; padding: 0 2px;
}
.del-judge:hover { color: #dc2626; }
.judge-input {
  border: 1px dashed #d1d5db; border-radius: 20px; padding: 2px 10px;
  font-size: 13px; width: 80px; outline: none;
}
.judge-input:focus { border-color: #f97316; }

/* ── contenteditable ── */
[contenteditable] { outline: none; border-radius: 3px; cursor: text; }
[contenteditable]:hover { background: #f9fafb; }
[contenteditable]:focus { background: #fffbeb; box-shadow: 0 0 0 2px #fcd34d; }

.table-wrap { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.06); overflow: hidden; }
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 900px; }
thead tr { background: #f9fafb; }
th {
  padding: 10px; font-size: 12px; font-weight: 600; color: #374151;
  border-bottom: 2px solid #e5e7eb; text-align: left; white-space: nowrap;
}
th.col-total { color: #dc2626; }
td { padding: 8px 10px; font-size: 13px; color: #374151; border-bottom: 1px solid #f3f4f6; vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafaf9; }

.cell-name { font-weight: 700; font-size: 14px; }
.cell-sub { font-size: 12px; color: #9ca3af; margin-top: 2px; }
.cell-doc a { color: #7c3aed; font-size: 12px; text-decoration: none; }
.cell-doc a:hover { text-decoration: underline; }

.score { font-weight: 700; font-size: 14px; min-height: 20px; }
.score-3_5   { color: #f97316; }
.score-3_5p  { color: #16a34a; }
.score-3_75  { color: #16a34a; }
.score-4_0   { color: #2563eb; }
.score-total { font-size: 16px; }
.comment { font-size: 12px; color: #6b7280; margin-top: 2px; line-height: 1.4; min-height: 16px; }

.score-cell { min-width: 110px; }
.row-del { opacity: 0; transition: opacity .15s; }
tr:hover .row-del { opacity: 1; }
.btn-icon { background: none; border: none; cursor: pointer; padding: 2px 6px; font-size: 13px; border-radius: 4px; color: #9ca3af; }
.btn-icon:hover { background: #fee2e2; color: #dc2626; }

.delay-section {
  background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px;
  padding: 12px 16px; margin-top: 16px; font-size: 13px; color: #92400e;
}
.delay-label { font-weight: 600; margin-bottom: 4px; }
.board-footer { padding: 12px 16px; border-top: 1px solid #f3f4f6; }

/* modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
  z-index: 200; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 12px; padding: 24px; width: 420px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.modal textarea { width: 100%; height: 180px; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px; font-size: 13px; font-family: monospace; resize: vertical; outline: none; }
.modal textarea:focus { border-color: #f97316; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
.modal input[type=text] { width: 100%; border: 1px solid #e5e7eb; border-radius: 8px; padding: 8px 12px; font-size: 14px; outline: none; margin-bottom: 10px; }
.modal input[type=text]:focus { border-color: #f97316; }

.toast {
  position: fixed; bottom: 24px; right: 24px; background: #111827; color: #fff;
  padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 300;
  transform: translateY(80px); opacity: 0; transition: all .3s; pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-title">📋 新人GD项目述职看板</div>
  <div class="toolbar-actions">
    <button class="btn" id="btnImport">📥 导入</button>
    <button class="btn" id="btnExport">📤 导出</button>
    <button class="btn btn-danger" id="btnReset">🗑 重置</button>
  </div>
</div>

<div class="tabs-bar" id="tabsBar">
  <span class="tab-add" id="btnAddPeriod" title="新增一期述职">＋</span>
</div>

<div id="boards"></div>

<!-- 导入modal -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <h3>📥 导入数据（JSON）</h3>
    <textarea id="importText" placeholder="粘贴 JSON 数据..."></textarea>
    <div class="modal-actions">
      <button class="btn" data-close="importModal">取消</button>
      <button class="btn btn-primary" id="btnDoImport">导入</button>
    </div>
  </div>
</div>

<!-- 文档链接modal -->
<div class="modal-overlay" id="docModal">
  <div class="modal">
    <h3>📎 编辑文档链接</h3>
    <input type="text" id="docUrlInput" placeholder="https://docs.xiaohongshu.com/...">
    <div class="modal-actions">
      <button class="btn" data-close="docModal">取消</button>
      <button class="btn btn-primary" id="btnSaveDoc">保存</button>
    </div>
  </div>
</div>

<!-- 新增期modal -->
<div class="modal-overlay" id="addPeriodModal">
  <div class="modal">
    <h3>➕ 新增述职期</h3>
    <input type="text" id="periodTitleInput" placeholder="标题，如：第二期述职">
    <input type="text" id="periodDateInput" placeholder="日期，如：2026年6月15日">
    <div class="modal-actions">
      <button class="btn" data-close="addPeriodModal">取消</button>
      <button class="btn btn-primary" id="btnConfirmPeriod">添加</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── 数据 ────────────────────────────────────────────
const KEY = 'gd_v3';

function mkData() {
  return {
    active: 'p1',
    periods: [{
      id: 'p1',
      title: '第一期述职',
      date: '2026年3月24日',
      judges: ['又思','金槌','尤弥','未希','龙龙','允浩'],
      delays: '小枝(王笑妍)（请假延期） 娜于(于增德吉)（请假延期） 梁爽(梁爽)（对客交付延期）',
      rows: [
        { id:'r1', name:'井野(魏欣)', group:'行业营销一组', city:'上海', l1:'尤弥', join:'2025/9/10', doc:'#',
          scores:{ '又思':{s:'3.5',c:'潜力有限'}, '金槌':{s:'3.5',c:'有点junior，说的很表面'}, '尤弥':{s:'3.5',c:'对客户理解可再提高'}, '未希':{s:'3.5',c:'行业环境理解需加强'}, '龙龙':{s:'3.5',c:'打开了日化IP突破口，QA思考不足'}, '允浩':{s:'3.5',c:'ownership足，策略规划可加强'} }, total:'3.5' },
        { id:'r2', name:'大鱼(张瑜)', group:'节点营销', city:'北京', l1:'未希', join:'2025/9/10', doc:'#',
          scores:{ '又思':{s:'3.5+',c:''}, '金槌':{s:'3.5+',c:'知乎，聪明，可更靠近行业'}, '尤弥':{s:'3.5+',c:'沟通清晰，创意好，单品牌价值交付需提升'}, '未希':{s:'3.5+',c:'IP价值与创意达标，行业痛点需深入'}, '龙龙':{s:'3.5+',c:'策略/招商/交付把控强，沟通灵活'}, '允浩':{s:'3.5+',c:'能量高有干劲，分享过于细节'} }, total:'3.5+' },
        { id:'r3', name:'斯比(张琦)', group:'商业市场部', city:'上海', l1:'龙龙', join:'2025/9/10', doc:'#',
          scores:{ '又思':{s:'3.5+',c:''}, '金槌':{s:'3.5',c:'要更贴近业务，思考更sharp'}, '尤弥':{s:'3.5+',c:'有观点和判断，基本面OK'}, '未希':{s:'3.5',c:'有点抽象，市场心智差异不清晰'}, '龙龙':{s:'3.5',c:'精细化打造OK，优先级判断较少'}, '允浩':{s:'3.5+',c:'能识别行业共性问题，给出方案'} }, total:'3.5+' },
        { id:'r4', name:'雪梨(陈姝羽)', group:'行业营销一组', city:'上海', l1:'尤弥', join:'2025/9/22', doc:'#',
          scores:{ '又思':{s:'3.5+',c:''}, '金槌':{s:'3.5+',c:'like校招妹妹junior，PM中有潜力'}, '尤弥':{s:'3.5',c:'成事动因足，聪明有想法，需培养'}, '未希':{s:'3.5+',c:'系统化梳理好，沟通界面清晰'}, '龙龙':{s:'3.5',c:'执行交付为主，保有工作热情'}, '允浩':{s:'3.75',c:'相较年龄和年限，表现超出预期'} }, total:'3.5+' },
        { id:'r5', name:'弯弯(唐婉)', group:'商业市场部', city:'北京', l1:'允浩', join:'2025/9/29', doc:'#',
          scores:{ '又思':{s:'3.75',c:''}, '金槌':{s:'3.75',c:'挺solid，可给更大战场'}, '尤弥':{s:'3.75',c:'成熟度高，对市场内容有热情'}, '未希':{s:'3.5+',c:'扎根业务，市场认知清晰，细节有打磨'}, '龙龙':{s:'3.5+',c:'商业化价值探索有个人深度思考'}, '允浩':{s:'3.75',c:'有ownership，结果有追求，价值交付不错'} }, total:'3.75' },
        { id:'r6', name:'柏瑞(许冰)', group:'行业营销一组', city:'上海', l1:'尤弥', join:'2025/10/22', doc:'#',
          scores:{ '又思':{s:'3.5+',c:''}, '金槌':{s:'3.75',c:'PM里很好的，有AI sense，做看板'}, '尤弥':{s:'3.5+',c:'举一反三，自动化表格缩短工作流'}, '未希':{s:'3.75',c:'稀缺人才选型，流程提效能力强'}, '龙龙':{s:'3.75',c:'体系化沉淀，对组织效率提升大'}, '允浩':{s:'3.5+',c:'标杆PM能力，执行力强，能效高'} }, total:'3.75' },
        { id:'r7', name:'曼曼(刘佳)', group:'行业营销二组', city:'上海', l1:'未希', join:'2025/10/27', doc:'#',
          scores:{ '又思':{s:'3.5+',c:''}, '金槌':{s:'3.5+',c:''}, '尤弥':{s:'3.5',c:'偏个案视角'}, '未希':{s:'3.5+',c:'懂客户，敢于寻找解法，积极推进'}, '龙龙':{s:'3.5+',c:'专耐难搞客户，能利用资源深层推进'}, '允浩':{s:'3.5',c:'懂客户，需在优势外再突破'} }, total:'3.5+' }
      ]
    }]
  };
}

let D = {};
let docTarget = null; // {pid, rid}

function load() {
  try { const s = localStorage.getItem(KEY); D = s ? JSON.parse(s) : mkData(); }
  catch(e) { D = mkData(); }
}
function save() { localStorage.setItem(KEY, JSON.stringify(D)); }
function getPeriod(pid) { return D.periods.find(p => p.id === pid); }
function getRow(pid, rid) { const p = getPeriod(pid); return p && p.rows.find(r => r.id === rid); }

// ─── 评分颜色 ────────────────────────────────────────
function scoreColor(s) {
  if (!s) return '';
  s = s.trim();
  if (s === '3.5+' || s === '3.5＋') return 'score-3_5p';
  if (s === '3.75') return 'score-3_75';
  if (s === '3.5') return 'score-3_5';
  const n = parseFloat(s);
  if (n >= 4) return 'score-4_0';
  if (n > 3.75) return 'score-4_0';
  if (n > 3.5) return 'score-3_75';
  if (n) return 'score-3_5';
  return '';
}
function refreshScoreEl(el) {
  el.className = el.className.split(' ').filter(c => !c.startsWith('score-3') && !c.startsWith('score-4')).join(' ');
  const c = scoreColor(el.textContent);
  if (c) el.classList.add(c);
}

// ─── 渲染 ─────────────────────────────────────────────
function render() {
  renderTabs();
  renderBoards();
}

function renderTabs() {
  const bar = document.getElementById('tabsBar');
  const addBtn = document.getElementById('btnAddPeriod');
  bar.querySelectorAll('.tab').forEach(t => t.remove());
  D.periods.forEach(p => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (p.id === D.active ? ' active' : '');
    tab.dataset.pid = p.id;

    const label = document.createElement('span');
    label.textContent = p.title + (p.date ? ' · ' + p.date : '');
    label.style.cursor = 'pointer';
    label.addEventListener('click', () => switchPeriod(p.id));

    const del = document.createElement('button');
    del.className = 'del-tab';
    del.textContent = '✕';
    del.title = '删除此期';
    del.addEventListener('click', (e) => { e.stopPropagation(); deletePeriod(p.id); });

    tab.append(label, del);
    bar.insertBefore(tab, addBtn);
  });
}

function renderBoards() {
  const container = document.getElementById('boards');
  container.innerHTML = '';
  D.periods.forEach(p => container.appendChild(buildBoard(p)));
}

function buildBoard(p) {
  const wrap = document.createElement('div');
  wrap.className = 'board' + (p.id === D.active ? ' active' : '');
  wrap.id = 'board-' + p.id;

  // ── 头部
  const header = document.createElement('div');
  header.className = 'board-header';

  const titleRow = document.createElement('div');
  titleRow.className = 'board-title';
  titleRow.innerHTML = '<span>📋</span>';

  const titleEl = ce('span', p.title);
  titleEl.dataset.f = 'title'; titleEl.dataset.pid = p.id;
  on(titleEl, 'blur', saveField);

  const sep = document.createElement('span');
  sep.textContent = '·'; sep.style.fontWeight = '400'; sep.style.color = '#9ca3af';

  const dateEl = ce('span', p.date);
  dateEl.dataset.f = 'date'; dateEl.dataset.pid = p.id;
  on(dateEl, 'blur', saveField);

  titleRow.append(titleEl, sep, dateEl);

  const judgeWrap = document.createElement('div');
  judgeWrap.className = 'board-judges';
  judgeWrap.innerHTML = '<b>评委：</b>';

  const judgeMgr = document.createElement('div');
  judgeMgr.className = 'judge-mgr';
  judgeMgr.id = 'judges-' + p.id;

  p.judges.forEach((j, i) => judgeMgr.appendChild(buildJudgeTag(p.id, j, i)));

  const jInput = document.createElement('input');
  jInput.className = 'judge-input';
  jInput.placeholder = '+ 添加评委';
  jInput.addEventListener('keydown', e => { if (e.key === 'Enter') addJudge(p.id, jInput); });

  judgeMgr.appendChild(jInput);
  judgeWrap.appendChild(judgeMgr);
  header.append(titleRow, judgeWrap);

  // ── 表格
  const tableWrap = document.createElement('div');
  tableWrap.className = 'table-wrap';
  const scroll = document.createElement('div');
  scroll.className = 'table-scroll';

  const table = document.createElement('table');
  table.id = 'table-' + p.id;

  // thead
  const thead = document.createElement('thead');
  const headRow = document.createElement('tr');
  ['薯名','小组','L1','入职日期','述职文档', ...p.judges, '综合', ''].forEach((h, i) => {
    const th = document.createElement('th');
    th.textContent = h;
    if (h === '综合') th.className = 'col-total';
    if (p.judges.includes(h)) th.className = 'score-cell';
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);

  // tbody
  const tbody = document.createElement('tbody');
  tbody.id = 'tbody-' + p.id;
  p.rows.forEach(r => tbody.appendChild(buildRow(p, r)));

  table.append(thead, tbody);
  scroll.appendChild(table);

  const footer = document.createElement('div');
  footer.className = 'board-footer';
  const addRowBtn = document.createElement('button');
  addRowBtn.className = 'btn btn-green';
  addRowBtn.textContent = '➕ 添加新人';
  addRowBtn.addEventListener('click', () => addRow(p.id));
  footer.appendChild(addRowBtn);

  tableWrap.append(scroll, footer);

  // ── 延期区
  const delay = document.createElement('div');
  delay.className = 'delay-section';
  const delayLabel = document.createElement('div');
  delayLabel.className = 'delay-label';
  delayLabel.textContent = '⚠️ 延期述职';
  const delayContent = ce('div', p.delays || '（暂无延期述职）');
  delayContent.dataset.f = 'delays'; delayContent.dataset.pid = p.id;
  delayContent.style.marginTop = '4px';
  on(delayContent, 'blur', saveField);
  delay.append(delayLabel, delayContent);

  wrap.append(header, tableWrap, delay);
  return wrap;
}

function buildJudgeTag(pid, name, idx) {
  const tag = document.createElement('span');
  tag.className = 'judge-tag';
  tag.dataset.judgeIdx = idx;

  const nameEl = document.createElement('span');
  nameEl.textContent = name;
  nameEl.contentEditable = 'true';
  nameEl.addEventListener('blur', () => {
    const p = getPeriod(pid);
    if (p) { p.judges[idx] = nameEl.textContent.trim(); save(); }
  });

  const del = document.createElement('button');
  del.className = 'del-judge';
  del.textContent = '×';
  del.addEventListener('click', () => removeJudge(pid, idx));

  tag.append(nameEl, del);
  return tag;
}

function buildRow(p, r) {
  const tr = document.createElement('tr');
  tr.id = 'row-' + p.id + '-' + r.id;

  // 薯名
  const tdName = document.createElement('td');
  const nameEl = ce('div', r.name, 'cell-name');
  nameEl.dataset.f = 'name'; nameEl.dataset.pid = p.id; nameEl.dataset.rid = r.id;
  on(nameEl, 'blur', saveRowField);
  tdName.appendChild(nameEl);

  // 小组
  const tdGroup = document.createElement('td');
  const groupEl = ce('div', r.group);
  groupEl.dataset.f = 'group'; groupEl.dataset.pid = p.id; groupEl.dataset.rid = r.id;
  on(groupEl, 'blur', saveRowField);
  const cityEl = ce('div', r.city, 'cell-sub');
  cityEl.dataset.f = 'city'; cityEl.dataset.pid = p.id; cityEl.dataset.rid = r.id;
  on(cityEl, 'blur', saveRowField);
  tdGroup.append(groupEl, cityEl);

  // L1
  const tdL1 = document.createElement('td');
  const l1El = ce('div', r.l1);
  l1El.dataset.f = 'l1'; l1El.dataset.pid = p.id; l1El.dataset.rid = r.id;
  on(l1El, 'blur', saveRowField);
  tdL1.appendChild(l1El);

  // 入职日期
  const tdJoin = document.createElement('td');
  const joinEl = ce('div', r.join);
  joinEl.dataset.f = 'join'; joinEl.dataset.pid = p.id; joinEl.dataset.rid = r.id;
  on(joinEl, 'blur', saveRowField);
  tdJoin.appendChild(joinEl);

  // 文档
  const tdDoc = document.createElement('td');
  tdDoc.className = 'cell-doc';
  const link = document.createElement('a');
  link.href = r.doc || '#';
  link.target = '_blank';
  link.textContent = '📎 查看文档';
  link.id = 'doclink-' + p.id + '-' + r.id;
  const editDocBtn = document.createElement('button');
  editDocBtn.className = 'btn';
  editDocBtn.style.cssText = 'font-size:11px;padding:2px 6px;margin-top:3px;display:block';
  editDocBtn.textContent = '✏️ 改链接';
  editDocBtn.addEventListener('click', () => openDocModal(p.id, r.id));
  tdDoc.append(link, editDocBtn);

  tr.append(tdName, tdGroup, tdL1, tdJoin, tdDoc);

  // 评委评分列
  p.judges.forEach(j => {
    const sc = (r.scores && r.scores[j]) || { s: '', c: '' };
    const td = document.createElement('td');
    td.className = 'score-cell';

    const scoreEl = ce('div', sc.s, 'score');
    const c = scoreColor(sc.s);
    if (c) scoreEl.classList.add(c);
    // 存储评委名到 data-judge
    scoreEl.dataset.judge = j;
    scoreEl.dataset.sf = 's';
    scoreEl.dataset.pid = p.id;
    scoreEl.dataset.rid = r.id;
    on(scoreEl, 'blur', saveScoreField);
    scoreEl.addEventListener('input', () => refreshScoreEl(scoreEl));

    const commentEl = ce('div', sc.c, 'comment');
    commentEl.dataset.judge = j;
    commentEl.dataset.sf = 'c';
    commentEl.dataset.pid = p.id;
    commentEl.dataset.rid = r.id;
    on(commentEl, 'blur', saveScoreField);

    td.append(scoreEl, commentEl);
    tr.appendChild(td);
  });

  // 综合
  const tdTotal = document.createElement('td');
  const totalEl = ce('div', r.total, 'score score-total');
  const tc = scoreColor(r.total);
  if (tc) totalEl.classList.add(tc);
  totalEl.dataset.f = 'total'; totalEl.dataset.pid = p.id; totalEl.dataset.rid = r.id;
  on(totalEl, 'blur', saveRowField);
  totalEl.addEventListener('input', () => refreshScoreEl(totalEl));
  tdTotal.appendChild(totalEl);

  // 删除按钮
  const tdDel = document.createElement('td');
  const delWrap = document.createElement('div');
  delWrap.className = 'row-del';
  const delBtn = document.createElement('button');
  delBtn.className = 'btn-icon';
  delBtn.title = '删除此行';
  delBtn.textContent = '🗑';
  delBtn.addEventListener('click', () => deleteRow(p.id, r.id));
  delWrap.appendChild(delBtn);
  tdDel.appendChild(delWrap);

  tr.append(tdTotal, tdDel);
  return tr;
}

// ─── 辅助 ─────────────────────────────────────────────
function ce(tag, text, cls) {
  const el = document.createElement(tag);
  el.textContent = text || '';
  el.contentEditable = 'true';
  if (cls) el.className = cls;
  return el;
}
function on(el, evt, fn) { el.addEventListener(evt, fn); }

// ─── 保存处理 ─────────────────────────────────────────
function saveField(e) {
  const el = e.target;
  const f = el.dataset.f, pid = el.dataset.pid;
  const p = getPeriod(pid);
  if (p) { p[f] = el.textContent.trim(); save(); }
  if (f === 'title' || f === 'date') renderTabs();
}

function saveRowField(e) {
  const el = e.target;
  const f = el.dataset.f, pid = el.dataset.pid, rid = el.dataset.rid;
  const r = getRow(pid, rid);
  if (r) { r[f] = el.textContent.trim(); save(); }
  if (f === 'total') refreshScoreEl(el);
}

function saveScoreField(e) {
  const el = e.target;
  const j = el.dataset.judge, sf = el.dataset.sf;
  const pid = el.dataset.pid, rid = el.dataset.rid;
  const r = getRow(pid, rid);
  if (!r) return;
  if (!r.scores[j]) r.scores[j] = { s: '', c: '' };
  r.scores[j][sf] = el.textContent.trim();
  save();
}

// ─── 期操作 ──────────────────────────────────────────
function switchPeriod(pid) {
  D.active = pid; save();
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.pid === pid));
  document.querySelectorAll('.board').forEach(b => b.classList.toggle('active', b.id === 'board-' + pid));
}

function deletePeriod(pid) {
  if (D.periods.length <= 1) { toast('至少保留一期！'); return; }
  if (!confirm('确定删除此期？')) return;
  D.periods = D.periods.filter(p => p.id !== pid);
  if (D.active === pid) D.active = D.periods[0].id;
  save(); render();
}

function confirmAddPeriod() {
  const title = document.getElementById('periodTitleInput').value.trim() || '新述职期';
  const date = document.getElementById('periodDateInput').value.trim();
  const id = 'p' + Date.now();
  D.periods.push({ id, title, date, judges: ['评委A', '评委B'], rows: [], delays: '' });
  D.active = id;
  closeModal('addPeriodModal');
  save(); render();
}

// ─── 评委操作 ─────────────────────────────────────────
function removeJudge(pid, idx) {
  const p = getPeriod(pid);
  if (!p) return;
  const name = p.judges[idx];
  if (!confirm('删除评委「' + name + '」及其所有评分？')) return;
  p.judges.splice(idx, 1);
  p.rows.forEach(r => { delete r.scores[name]; });
  save(); render(); switchPeriod(pid);
}

function addJudge(pid, input) {
  const name = input.value.trim();
  if (!name) return;
  const p = getPeriod(pid);
  if (!p) return;
  if (p.judges.includes(name)) { toast('评委已存在'); return; }
  p.judges.push(name);
  p.rows.forEach(r => { if (!r.scores[name]) r.scores[name] = { s: '', c: '' }; });
  save(); render(); switchPeriod(pid);
}

// ─── 行操作 ──────────────────────────────────────────
function addRow(pid) {
  const p = getPeriod(pid);
  if (!p) return;
  const id = 'r' + Date.now();
  const scores = {};
  p.judges.forEach(j => { scores[j] = { s: '', c: '' }; });
  const r = { id, name: '新人(真名)', group: '小组', city: '城市', l1: '', join: '', doc: '#', scores, total: '' };
  p.rows.push(r);
  save();
  document.getElementById('tbody-' + pid).appendChild(buildRow(p, r));
  toast('✅ 新人已添加，请点击格子编辑');
}

function deleteRow(pid, rid) {
  const r = getRow(pid, rid);
  if (!confirm('删除「' + (r ? r.name : '此行') + '」？')) return;
  const p = getPeriod(pid);
  if (p) p.rows = p.rows.filter(x => x.id !== rid);
  save();
  const tr = document.getElementById('row-' + pid + '-' + rid);
  if (tr) tr.remove();
}

// ─── 文档链接 ─────────────────────────────────────────
function openDocModal(pid, rid) {
  docTarget = { pid, rid };
  const r = getRow(pid, rid);
  document.getElementById('docUrlInput').value = (r && r.doc !== '#') ? r.doc : '';
  openModal('docModal');
  setTimeout(() => document.getElementById('docUrlInput').focus(), 100);
}

document.getElementById('btnSaveDoc').addEventListener('click', () => {
  if (!docTarget) return;
  const { pid, rid } = docTarget;
  const url = document.getElementById('docUrlInput').value.trim() || '#';
  const r = getRow(pid, rid);
  if (r) {
    r.doc = url; save();
    const link = document.getElementById('doclink-' + pid + '-' + rid);
    if (link) link.href = url;
    toast('✅ 链接已保存');
  }
  closeModal('docModal');
});

// ─── 导入/导出 ────────────────────────────────────────
document.getElementById('btnExport').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(D, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'gd_review_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  toast('✅ 已导出');
});

document.getElementById('btnImport').addEventListener('click', () => {
  document.getElementById('importText').value = '';
  openModal('importModal');
});

document.getElementById('btnDoImport').addEventListener('click', () => {
  try {
    const imported = JSON.parse(document.getElementById('importText').value.trim());
    if (!imported.periods) throw new Error('缺少 periods 字段');
    D = imported; save(); render();
    closeModal('importModal');
    toast('✅ 导入成功');
  } catch(e) { alert('格式错误：' + e.message); }
});

document.getElementById('btnReset').addEventListener('click', () => {
  if (!confirm('确定重置所有数据？')) return;
  D = mkData(); save(); render();
  toast('已重置');
});

// ─── 新增期 ──────────────────────────────────────────
document.getElementById('btnAddPeriod').addEventListener('click', () => {
  document.getElementById('periodTitleInput').value = '';
  document.getElementById('periodDateInput').value = '';
  openModal('addPeriodModal');
  setTimeout(() => document.getElementById('periodTitleInput').focus(), 100);
});
document.getElementById('btnConfirmPeriod').addEventListener('click', confirmAddPeriod);

// ─── Modal ────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('[data-close]').forEach(btn => {
  btn.addEventListener('click', () => closeModal(btn.dataset.close));
});
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) closeModal(m.id); });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(m => closeModal(m.id));
});

// ─── Toast ────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2500);
}

// ─── 启动 ─────────────────────────────────────────────
load();
render();
</script>
</body>
</html>
